<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="pokemons.css">
    <link rel="stylesheet" href="search.css">
</head>
<body>
    <header>
        <img src="assets/Pokédex_logo.png" alt="Logotipo Pokedex">
    </header>
    <div class="container">
    <div class="search-wrapper"> 
        <input type="text" id="search-bar" placeholder="Procure seu Pokémon...">
        <ul id="autocomplete-list"></ul>
    </div>

    <ul class="lista-pokemon" id="lista-pokemon">
        <li class="pokemon">
            <p class="nome">Bulbasaur</p>
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/1.svg" alt="Bulbasaur">
        </li>
    </ul>
    </div>

    <div id="paginacao">
        <button id="btnAnterior">Anterior</button>
        <button id="btnProxima">Próxima</button>
    </div>

    <script src="./main.js"></script>
    <script src="./search.js"></script>
</body>
</html>
