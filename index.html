<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="stylesheet" href="pokemons.css">
  <link rel="stylesheet" href="search.css">
  <link rel="stylesheet" href="details.css">
  <link href="https://fonts.googleapis.com/css2?family=Concert+One&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <a href="#" id="btn-voltar" style="display:none;">Voltar para a Pokédex</a>
    <img src="assets/Pokédex_logo.png" alt="Logotipo Pokedex" id="logo-pokedex">
  </header>

  <div class="container">
    <div class="search-wrapper">
      <input type="text" id="search-bar" placeholder="Procure seu Pokémon...">
      <ul id="autocomplete-list"></ul>
    </div>

    <section id="tela-lista">
      <ul class="lista-pokemon" id="lista-pokemon"></ul>
      <div id="paginacao"></div>
    </section>

    <section id="tela-detalhes" style="display:none;">
      <div id="pokemon-detalhes"></div>
    </section>
  </div>

  <script src="./main.js"></script>
  <script src="./search.js"></script>
  <script src="./detalhes.js"></script>

  <script>
    function abrirDetalhes(nome) {
      document.getElementById('tela-lista').style.display = 'none';
      document.getElementById('tela-detalhes').style.display = 'block';
      document.getElementById('btn-voltar').style.display = 'inline-block';
      carregarDetalhes(nome);
    }

    document.getElementById('btn-voltar').addEventListener('click', function (e) {
      e.preventDefault();
      document.getElementById('tela-detalhes').style.display = 'none';
      document.getElementById('tela-lista').style.display = 'block';
      document.getElementById('btn-voltar').style.display = 'none';
    });
  </script>

</body>
</html>
